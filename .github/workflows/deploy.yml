name: "Deploy AimMetal's Blog Themed Quartz"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "aimmetal-blog-pages"
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.repository == 'aimmetal-tech/aimmetal-tech.github.io' }}
    runs-on: ubuntu-latest
    name: Build Quartz Blog

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Quartz plugins
        run: node ./quartz/bootstrap-cli.mjs plugin install

      - name: Build Quartz
        run: node ./quartz/bootstrap-cli.mjs build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4