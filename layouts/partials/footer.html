<footer
  class="site-footer mx-auto min-h-[4.5rem] max-w-(--w) px-8 pt-4 text-xs tracking-wider uppercase opacity-60"
>
  <div class="footer-grid">
    <div class="footer-left">
      {{- with site.Params.icp }}
      <a
        class="link icp-link"
        href="https://beian.miit.gov.cn/"
        rel="noopener"
        target="_blank"
        >{{ . }}</a
      >
      {{- end }}
      <div>
      {{- if site.Copyright -}} {{- site.Copyright -}} {{- else -}} &copy; {{-
      now.Year }}
      <a class="link" href="{{- `` | absURL -}}">{{- site.Title -}}</a>
      {{- end -}}
      </div>
    </div>
    <div class="footer-right">
      <span class="beian-link">
        <img src="{{ `beian-icon.png` | relURL }}" alt="" width="20" height="20" />
        <a
          class="link"
          href="https://beian.mps.gov.cn/#/query/webSearch?code=45010202000888"
          rel="noreferrer"
          target="_blank"
          >桂公网安备45010202000888号</a
        >
      </span>
      <div class="footer-powered">
        <a
          class="link"
          href="https://gohugo.io/"
          rel="noopener"
          target="_blank"
          >powered by hugo</a
        >
        <a
          class="link"
          href="https://github.com/nanxiaobei/hugo-paper"
          rel="noopener"
          target="_blank"
          >hugo-paper</a
        >
      </div>
    </div>
  </div>
</footer>
<div class="footer-bottom-space" aria-hidden="true"></div>
